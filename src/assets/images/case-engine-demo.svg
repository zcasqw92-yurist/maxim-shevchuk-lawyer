<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="t d"><title id="t">Передача 650 000 рублей за двигатель</title><desc id="d">Демонстрационный заменяемый визуал юридического кейса</desc>
<style>.bg{fill:#10283d}.paper{fill:#fffefb}.gold{fill:#c39a5d}.white{fill:#fffefb}.ink{fill:#10283d}.line{fill:#d9d4ca}.h{font:500 42px Georgia,serif}.t{font:20px Arial,sans-serif}.b{font:700 15px Arial,sans-serif;letter-spacing:1px}</style><rect width="1200" height="900" class="bg"/><text x="70" y="72" class="b gold">ДЕМО-ВИЗУАЛ · ЗАМЕНИТЬ РЕАЛЬНЫМ ПОДТВЕРЖДЕНИЕМ</text><text x="70" y="128" class="h white">Передача 650 000 ₽ за двигатель</text><text x="70" y="164" class="t white" opacity=".65">карта доказательств и структура заявления</text>
