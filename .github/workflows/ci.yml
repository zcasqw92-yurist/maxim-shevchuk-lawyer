name: Проверка сайта

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Настроить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: npm

      - name: Установить зависимости
        run: npm ci

      - name: Собрать сайт
        run: npm run build

      - name: Проверить HTML
        run: npm run validate

      - name: Проверить SEO
        run: npm run audit:seo

      - name: Проверить быстрые ситуации
        run: npm run test:quick-choices

      - name: Проверить форму связи позже
        run: npm run test:callback

      - name: Проверить форму связи в браузере
        run: npm run test:callback-interaction

      - name: Проверить сообщения мессенджеров
        run: npm run test:messenger-intents

      - name: Проверить содержание страниц услуг
        run: npm run test:service-pages

      - name: Проверить типографику и сообщения услуг
        run: npm run test:service-pages-interaction

      - name: Проверить вёрстку и взаимодействия
        run: npm run test:visual
