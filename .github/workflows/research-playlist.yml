name: Временный анализ YouTube-плейлиста

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/research-playlist.yml'
      - 'scripts/research-playlist.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить yt-dlp
        run: python -m pip install --upgrade yt-dlp

      - name: Собрать метаданные и субтитры
        run: bash scripts/research-playlist.sh

      - name: Показать состав плейлиста
        if: always()
        run: |
          echo '=== manifest.txt ==='
          cat research-output/manifest.txt 2>/dev/null || true
          echo '=== diagnostics.log ==='
          cat research-output/diagnostics.log 2>/dev/null || true

      - name: Сохранить результаты
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playlist-audit-data
          path: research-output
          if-no-files-found: warn
          retention-days: 3
