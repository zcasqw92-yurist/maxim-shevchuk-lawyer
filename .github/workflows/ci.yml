name: Проверка сайта

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Настроить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: npm

      - name: Установить зависимости
        run: npm ci

      - name: Собрать сайт
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          code=$?
          cat build.log
          exit $code

      - name: Сохранить журнал ошибки сборки
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Проверить HTML
        run: npm run validate

      - name: Проверить SEO
        run: npm run audit:seo

      - name: Проверить быстрые ситуации
        run: npm run test:quick-choices

      - name: Проверить форму связи позже
        run: npm run test:callback

      - name: Проверить форму связи в браузере
        run: npm run test:callback-interaction

      - name: Проверить сообщения мессенджеров
        run: npm run test:messenger-intents

      - name: Проверить содержание страниц услуг
        run: npm run test:service-pages

      - name: Проверить типографику и сообщения услуг
        run: npm run test:service-pages-interaction

      - name: Проверить гарантии процесса
        run: npm run test:process-guarantees

      - name: Проверить примеры работы
        run: npm run test:case-studies

      - name: Проверить экспертный поисковый контент
        run: npm run test:search-visibility

      - name: Проверить мобильную панель
        run: npm run test:mobile-actions

      - name: Проверить версию сборки и события аналитики
        run: npm run test:deployment-observability

      - name: Проверить бюджеты производительности
        run: npm run test:performance-budget

      - name: Проверить видео по требованию
        run: npm run test:video-ready

      - name: Проверить Core Web Vitals
        run: npm run test:core-web-vitals

      - name: Проверить вёрстку и взаимодействия
        shell: bash
        run: |
          set +e
          npm run test:visual > visual-test.log 2>&1
          code=$?
          cat visual-test.log
          exit $code

      - name: Сохранить журнал визуальной проверки
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-log
          path: visual-test.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Провести полный браузерный аудит
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/browser-audit.mjs')
          text = path.read_text(encoding='utf-8')
          old_args = 'args: chromiumBinary.args.concat(["--disable-background-networking", "--disable-extensions", "--font-render-hinting=none"]),'
          new_args = 'args: ["--no-sandbox", "--disable-setuid-sandbox", "--disable-dev-shm-usage", "--disable-gpu", "--disable-background-networking", "--disable-extensions", "--font-render-hinting=none"],'
          if old_args not in text:
              raise SystemExit('Не найдена строка запуска Chromium для аудита')
          text = text.replace(old_args, new_args)
          old_prepare = '''    window.scrollTo(0, 0);
  });
};'''
          new_prepare = '''    window.scrollTo(0, 0);
  });
  const pageHeight = await page.evaluate(() => document.documentElement.scrollHeight);
  const step = Math.max(420, Math.floor((await page.viewportSize()).height * 0.72));
  for (let y = 0; y < pageHeight; y += step) {
    await page.evaluate((top) => window.scrollTo(0, top), y);
    await page.waitForTimeout(45);
  }
  await page.evaluate(() => window.scrollTo(0, 0));
  await page.waitForTimeout(160);
};'''
          if old_prepare not in text:
              raise SystemExit('Не найдена функция подготовки страницы')
          text = text.replace(old_prepare, new_prepare)
          text = text.replace('desktop.locator("dialog[open] [data-dialog-close]").first().click()', 'desktop.locator("[data-video-dialog] [data-video-close]").first().click()', 1)
          path.write_text(text, encoding='utf-8')
          PY
          node scripts/browser-audit.mjs

      - name: Сохранить скриншоты браузерного аудита
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-report
          path: reports/browser-audit
          if-no-files-found: error
          retention-days: 3

      - name: Проверить рабочую production-сборку
        env:
          SITE_PRODUCTION: 'true'
          SITE_URL: ${{ format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          SITE_BASE_PATH: ${{ format('/{0}', github.event.repository.name) }}
          INDEXNOW_KEY: ci-indexnow-key
        run: npm run build && npm run validate && npm run audit:seo && npm run test:deployment-observability && npm run test:performance-budget && npm run test:video-ready && npm run test:core-web-vitals

      - name: Сохранить production-сборку для ручной браузерной проверки
        uses: actions/upload-artifact@v4
        with:
          name: browser-audit-dist
          path: dist
          if-no-files-found: error
          retention-days: 3
