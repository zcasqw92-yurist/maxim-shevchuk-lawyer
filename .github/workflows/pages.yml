name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    env:
      SITE_PRODUCTION: 'true'
      SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
      SITE_BASE_PATH: ${{ vars.SITE_BASE_PATH || format('/{0}', github.event.repository.name) }}
      GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}
      YANDEX_SITE_VERIFICATION: ${{ vars.YANDEX_SITE_VERIFICATION }}
      SITE_ANALYTICS_ENABLED: ${{ vars.SITE_ANALYTICS_ENABLED || 'false' }}
      GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}
      YANDEX_METRICA_ID: ${{ vars.YANDEX_METRICA_ID }}
      INDEXNOW_KEY: ${{ vars.INDEXNOW_KEY }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Validate generated site
        run: npm run validate && npm run audit:seo && npm run test:deployment-observability

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify published build
        env:
          SITE_PUBLIC_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_BUILD_SHA: ${{ github.sha }}
        run: npm run test:live

      - name: Notify Yandex and IndexNow partners
        continue-on-error: true
        run: npm run submit:indexnow